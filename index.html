<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <!-- Canvas Confetti Library for the celebration effect -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Modern Web Fonts */
        @import url('https://googleapis.com');

        /* Global Styles */
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        /* Header / Birthday Message Section */
        header {
            padding: 50px 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: #ff477e;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: bounce 2s infinite;
        }

        p.subtitle {
            font-size: 1.3rem;
            color: #6c757d;
            margin-top: 0;
        }

        /* Interactive Button Section */
        .celebrate-btn {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .celebrate-btn:hover {
            transform: scale(1.05);
            background-color: #ff2a63;
        }

        /* Photo Gallery Layout */
        .gallery-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            color: #ff7096;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Individual Photo Styling */
        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px) rotate(2deg);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #f0f0f0;
        }

        .photo-caption {
            margin-top: 12px;
            font-weight: 600;
            color: #ff477e;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive design tweaks */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .photo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Main Greeting Area -->
    <header>
        <h1>Happy Birthday, Chibaa 💜! 🎂</h1>
        <p class="subtitle">Wishing you the most magical, amazing day ever!</p>
        
        <!-- Updated Magic Celebration Button -->
        <button class="celebrate-btn" onclick="playMusicAndConfetti()">Click for Magic ✨</button>
        
        <!-- Hidden Audio Loop Component -->
        <audio id="birthday-music" loop>
            <source src="https://soundhelix.com" type="audio/mpeg">
        </audio>
    </header>

    <!-- Interactive Memories Photo Gallery Grid -->
    <div class="gallery-container">
        <h2> Favorite Memories and Pics 😋 📸</h2>
        <div class="photo-grid">
            
            <!-- PHOTO 1: Paste your first Google Drive File ID below -->
            <div class="photo-card">
                <img src="https://i.ibb.co/QFgTzxJ5/IMG-20260529-WA0024.jpg" alt="Birthday Memory 1">
                <div class="photo-caption">Best smile ever! 🥰</div>
            </div>

            <!-- PHOTO 2: Paste your second Google Drive File ID below -->
            <div class="photo-card">
                <img src="https://i.ibb.co/SDS3my77/IMG-20260529-WA0011.jpg" alt="Birthday Memory 2">
                <div class="photo-caption">Always you 😂</div>
            </div>

            <!-- PHOTO 3: Paste your third Google Drive File ID below -->
            <div class="photo-card">
                <img src="https://i.ibb.co/HTpstjmG/IMG-20260529-WA0007.jpg" alt="Birthday Memory 3">
                <div class="photo-caption">To many more adventures! ✈️</div>
            </div>

        </div>
    </div>

    <!-- JavaScript For Interactivity -->
    <script>
        // Automatically launch confetti bursts when the page finishes loading
        window.addEventListener('DOMContentLoaded', () => {
            triggerConfetti();
            setTimeout(triggerConfetti, 2000); 
        });

        // Function that executes the confetti blast animation
        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#f9bec7']
            });
        }

        // Function to launch confetti and trigger audio streaming playback
        function playMusicAndConfetti() {
            triggerConfetti();
            
            const music = document.getElementById('birthday-music');
            music.play().catch(error => {
                console.log("Audio playback blocked by web browser rules:", error);
            });
        }
    </script>
</body>
</html>
